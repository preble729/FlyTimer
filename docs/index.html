<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlyTimer</title>
    <style>
        :root {
            --bg: #f4f8f8;
            --surface: #ffffff;
            --text: #1f2937;
            --muted: #667085;
            --accent: #0f766e;
            --border: #d8e2e1;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            background:
                radial-gradient(circle at top, rgba(15, 118, 110, 0.12), transparent 30%),
                linear-gradient(180deg, #edf7f6 0%, var(--bg) 100%);
            color: var(--text);
            font-family: Georgia, "Times New Roman", serif;
        }

        .card {
            width: min(680px, 100%);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 36px;
            box-shadow: 0 14px 40px rgba(15, 23, 42, 0.07);
        }

        h1 {
            margin: 0 0 12px;
            font-size: clamp(2rem, 4vw, 2.7rem);
        }

        p {
            line-height: 1.65;
            color: var(--muted);
            margin: 0 0 18px;
        }

        a {
            color: var(--accent);
            font-weight: 700;
            text-decoration-thickness: 2px;
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>FlyTimer</h1>
        <p>
            FlyTimer is an Android app for recording sprint timing data, organizing athletes and races,
            and reviewing results.
        </p>
        <p>
            Privacy Policy:
            <a href="./privacy-policy.html">View the FlyTimer Privacy Policy</a>
        </p>
        <p>
            Contact:
            <a href="mailto:preble729@gmail.com">preble729@gmail.com</a>
        </p>
    </main>
</body>
</html>
