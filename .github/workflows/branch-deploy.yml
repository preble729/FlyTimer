name: Branch Deploy

on:
  push:
    branches:
      - "**"

concurrency:
  group: branch-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-dev:
    if: github.ref_name != 'main' && github.ref_name != 'develop'
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Write Firebase credentials
        shell: bash
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > "${RUNNER_TEMP}/firebase.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=${RUNNER_TEMP}/firebase.json" >> "$GITHUB_ENV"

      - name: Build dev APK
        run: ./gradlew :app:assembleDevDebug

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Upload dev build
        run: |
          firebase appdistribution:distribute app/build/outputs/apk/dev/debug/app-dev-debug.apk \
            --app "${{ secrets.FIREBASE_DEV_APP_ID }}" \
            --groups "${{ secrets.FIREBASE_DEV_GROUP }}" \
            --release-notes "Dev build from ${{ github.ref_name }} @ ${{ github.sha }}"

  deploy-qa:
    if: github.ref_name == 'develop'
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Write Firebase credentials
        shell: bash
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > "${RUNNER_TEMP}/firebase.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=${RUNNER_TEMP}/firebase.json" >> "$GITHUB_ENV"

      - name: Build QA APK
        run: ./gradlew :app:assembleQaDebug

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Upload QA build
        run: |
          firebase appdistribution:distribute app/build/outputs/apk/qa/debug/app-qa-debug.apk \
            --app "${{ secrets.FIREBASE_QA_APP_ID }}" \
            --groups "${{ secrets.FIREBASE_QA_GROUP }}" \
            --release-notes "QA build from develop @ ${{ github.sha }}"

  deploy-prod:
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Write Play service account
        shell: bash
        run: |
          echo '${{ secrets.PLAY_SERVICE_ACCOUNT }}' > "${RUNNER_TEMP}/play-account.json"
          echo "PLAY_SERVICE_ACCOUNT_JSON_PATH=${RUNNER_TEMP}/play-account.json" >> "$GITHUB_ENV"

      - name: Decode Android keystore
        shell: bash
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > "${RUNNER_TEMP}/release.keystore"
          echo "ANDROID_KEYSTORE_PATH=${RUNNER_TEMP}/release.keystore" >> "$GITHUB_ENV"
          echo "ANDROID_KEYSTORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" >> "$GITHUB_ENV"
          echo "ANDROID_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}" >> "$GITHUB_ENV"
          echo "ANDROID_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}" >> "$GITHUB_ENV"

      - name: Publish prodRelease bundle to Play internal
        run: ./gradlew :app:publishProdReleaseBundle
